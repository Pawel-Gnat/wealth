name: Setup
description: Setup node project

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true

    - name: Configure node
      uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
