name: wealth

services:
  postgres:
    image: postgres:latest
    container_name: wealth-postgres
    restart: unless-stopped
    ports:
      - 5433:5432
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
